name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Check backend import
        run: python -c "import backend.main; print(backend.main.app.title)"

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 删掉了原来的 pnpm/action-setup 配置
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          # 改成 npm 缓存
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        # 改成 npm ci（推荐，用本地的 package-lock.json 精准安装）
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build